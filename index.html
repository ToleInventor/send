<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Email Sender · Static Hardcoded</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 600px;
      width: 100%;
      background: #ffffff;
      padding: 30px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h2 {
      margin-top: 0;
      color: #0b1e33;
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sub {
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
      background: #f1f5f9;
      padding: 12px 16px;
      border-radius: 10px;
    }
    .sub code {
      background: #e2e8f0;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: #1e293b;
    }
    .field-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
      font-size: 14px;
    }
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d9e6;
      border-radius: 10px;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 13px;
      background: #fafcff;
      transition: 0.2s;
      resize: vertical;
      min-height: 100px;
    }
    textarea:focus {
      outline: 2px solid #2563eb;
      border-color: transparent;
      background: #ffffff;
    }
    .btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      margin: 10px 0 18px 0;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.2);
    }
    .btn:hover {
      background: #1d4ed8;
      transform: scale(1.01);
    }
    .btn:disabled {
      background: #94a3b8;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }
    .log-container {
      border-top: 1px solid #e9edf2;
      padding-top: 18px;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .log-header h4 {
      margin: 0;
      color: #1e293b;
      font-weight: 600;
    }
    .log-header span {
      font-size: 12px;
      background: #eef2f6;
      padding: 2px 10px;
      border-radius: 20px;
      color: #334155;
    }
    #status {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 12.5px;
      background: #0f172a;
      color: #a5d8ff;
      padding: 16px 18px;
      border-radius: 12px;
      min-height: 100px;
      max-height: 280px;
      overflow-y: auto;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #1e293b;
    }
    #status .success { color: #4ade80; }
    #status .error { color: #f87171; }
    #status .info { color: #93c5fd; }
    .badge {
      background: #eef2f6;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 12px;
      color: #1e293b;
    }
    .email-count {
      background: #dbeafe;
      color: #1e3a8a;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
    }
    .footer-note {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
      border-top: 1px solid #e9edf2;
      padding-top: 14px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>📧 Bulk Mail · Hardcoded</h2>
  <div class="sub">
    ⚡ Template <strong>template_km1kppo</strong> · uses <code>{{to_email}}</code>.<br>
    Recipients are pre‑loaded from the static list. You can edit below.
  </div>

  <!-- HARDCODED EMAIL LIST (comma separated, as provided) -->
  <div class="field-group">
    <label for="email-input">📋 Recipients (comma separated)</label>
    <textarea id="email-input" rows="5">horlahshojuhmee@gmail.com, shugrayrosie@gmail.com, tamaragreen745@gmail.com, klauscreativesworld@gmail.com, alvinmope96@gmail.com, udofotelijah15@gmail.com, sc774824@gmail.com, timothymwangi995@gmail.com, kamoet6@gmail.com, amazingceo94@gmail.com, nybonyimary63@gmail.com, kenwanjalajuma@gmail.com, colemanthiyanna495@gmail.com, marynjuguna1950@gmail.com, asajutemtope@gmail.com, domingoarlene700@gmail.com, Komo84handsome@gmail.com, Bilhamaina656@gmail.com, ancho.kristian22@gmail.com, olasojuoluwatimileyin24@gmail.com, Damilolaolushola66@gmail.com, perisnjenga90@gmail.com, alvinpamba819@gmail.com, domingoarlenarlene700@gmail.com, tolecaxtone2@gmail.com</textarea>
  </div>

  <button class="btn" id="send-btn" onclick="processAndSend()">🚀 Launch Mailing Process</button>

  <div class="log-container">
    <div class="log-header">
      <h4>📜 Activity Log</h4>
      <span class="email-count" id="email-count-badge">0 recipients</span>
    </div>
    <div id="status">⏳ System ready. Press “Launch” to start.</div>
  </div>
  <div class="footer-note">
    • Sequential send · 1.5s delay between emails • EmailJS public key embedded
  </div>
</div>

<script>
  (function() {
    // ---------- CONFIG ----------
    const serviceID = "service_mrp464x";
    const templateID = "template_km1kppo";
    const publicKey = "wpkTO75TywMfnFjyK";

    // DOM refs
    const btn = document.getElementById('send-btn');
    const statusDiv = document.getElementById('status');
    const emailInput = document.getElementById('email-input');
    const badge = document.getElementById('email-count-badge');

    // Update badge count on input change
    emailInput.addEventListener('input', updateBadge);
    function updateBadge() {
      const raw = emailInput.value.trim();
      if (!raw) {
        badge.textContent = '0 recipients';
        return;
      }
      const list = raw.split(',').map(e => e.trim()).filter(e => e.length > 0);
      badge.textContent = list.length + ' recipient' + (list.length !== 1 ? 's' : '');
    }
    updateBadge(); // initial

    // ---------- CORE SEND ----------
    window.processAndSend = async function processAndSend() {
      // 1. read & parse
      const raw = emailInput.value.trim();
      if (!raw) {
        statusDiv.innerHTML = `<span class="error">⚠️ Please enter at least one email address.</span>`;
        return;
      }

      const emailList = raw.split(',')
                           .map(email => email.trim())
                           .filter(email => email.length > 0);

      if (emailList.length === 0) {
        statusDiv.innerHTML = `<span class="error">⚠️ No valid emails found.</span>`;
        return;
      }

      // Disable button
      btn.disabled = true;
      btn.textContent = '⏳ Sending...';
      btn.style.background = '#94a3b8';

      // Clear log and show start
      statusDiv.innerHTML = `🔹 <span class="info">Targeting ${emailList.length} recipients.</span><br>`;

      // 2. Loop through emails
      for (let i = 0; i < emailList.length; i++) {
        const email = emailList[i];
        // basic validation (presence of @)
        if (!email.includes('@')) {
          statusDiv.innerHTML += `⏭️ Skipping <span style="color:#fbbf24;">${email}</span> (invalid format)<br>`;
          continue;
        }

        // Show progress
        statusDiv.innerHTML += `📤 [${i+1}/${emailList.length}] Sending to ${email} ... `;

        // Prepare payload
        const payload = {
          service_id: serviceID,
          template_id: templateID,
          user_id: publicKey,
          template_params: {
            to_email: email
          }
        };

        try {
          const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            statusDiv.innerHTML += `<span class="success">✅ SUCCESS</span><br>`;
          } else {
            let errorText = await response.text();
            // trim long error
            if (errorText.length > 120) errorText = errorText.substring(0, 120) + '…';
            statusDiv.innerHTML += `<span class="error">❌ Server error (${response.status}): ${errorText}</span><br>`;
          }
        } catch (err) {
          statusDiv.innerHTML += `<span class="error">❌ Network error: ${err.message}</span><br>`;
        }

        // pacing delay (1.5s)
        await new Promise(resolve => setTimeout(resolve, 1500));

        // auto-scroll log
        statusDiv.scrollTop = statusDiv.scrollHeight;
      }

      // finalise
      statusDiv.innerHTML += `<br>✅ <span class="success">Campaign finished.</span> (${emailList.length} processed)`;
      btn.disabled = false;
      btn.textContent = '🚀 Launch Mailing Process';
      btn.style.background = '#2563eb';
      statusDiv.scrollTop = statusDiv.scrollHeight;
    };

    // (Optional) extra: if user wants to re-run, button enables
    // ensure badge updates on paste etc.
  })();
</script>

</body>
</html>
